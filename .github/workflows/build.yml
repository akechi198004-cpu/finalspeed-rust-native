name: build

on:
  push:
  pull_request:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rustfmt, clippy

      - name: Format Check
        run: cargo fmt --check

      - name: Clippy Check
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

      - name: Build Release
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fspeed-rs-linux-x64
          path: target/release/fspeed-rs
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Format Check
        run: cargo fmt --check

      - name: Clippy Check
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

      - name: Build Release
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fspeed-rs-windows-x64
          path: target/release/fspeed-rs.exe
          if-no-files-found: error
